spring.application.name=config-server
server.port=8888
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka/}

# LOCAL CONFIG STORAGE (Simple for now)
spring.profiles.active=native
spring.cloud.config.server.native.search-locations=classpath:/config

spring.cloud.config.server.overrides.spring.cloud.config.override-none=true
spring.cloud.config.server.encrypt.enabled=false

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}
