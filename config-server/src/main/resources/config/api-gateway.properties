server.port=9090

#JWT
jwt.secret=${JWT_SECRET}

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka/}

# Enable discovery routing
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/user-service/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/user-service/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[1].id=operator-service
spring.cloud.gateway.routes[1].uri=lb://OPERATOR-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/operator-service/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/operator-service/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[2].id=recharge-service
spring.cloud.gateway.routes[2].uri=lb://RECHARGE-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/recharge-service/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/recharge-service/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/payment-service/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/payment-service/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/notification-service/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/notification-service/(?<segment>.*), /${segment}

# SpringDoc
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.urls[0].name=user-service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=operator-service
springdoc.swagger-ui.urls[1].url=/operator-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=recharge-service
springdoc.swagger-ui.urls[2].url=/recharge-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=payment-service
springdoc.swagger-ui.urls[3].url=/payment-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=notification-service
springdoc.swagger-ui.urls[4].url=/notification-service/v3/api-docs
server.forward-headers-strategy=framework


# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
