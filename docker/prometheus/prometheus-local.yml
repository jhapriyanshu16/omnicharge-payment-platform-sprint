global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "omnicharge-local"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - localhost:8761
          - localhost:8888
          - localhost:9090
          - localhost:8081
          - localhost:8082
          - localhost:8083
          - localhost:8084
          - localhost:8085
