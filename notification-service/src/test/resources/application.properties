spring.application.name=notification-service
spring.cloud.config.enabled=false
spring.cloud.discovery.enabled=false
eureka.client.enabled=false
spring.config.import=optional:configserver:
spring.main.allow-bean-definition-overriding=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Mail Configuration for Testing
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@omnicharge.com
spring.mail.password=test-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ============================================
# DISTRIBUTED TRACING (Test Configuration)
# ============================================
# Disable tracing for unit tests
management.tracing.enabled=false

# Enable Feign micrometer integration (no harm to disable)
spring.cloud.openfeign.micrometer.enabled=false

# Server
server.port=0
