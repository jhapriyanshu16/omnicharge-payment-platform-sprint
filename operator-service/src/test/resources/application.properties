spring.application.name=operator-service
spring.cloud.config.enabled=false
spring.cloud.discovery.enabled=false
eureka.client.enabled=false
spring.config.import=optional:configserver:
spring.main.allow-bean-definition-overriding=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# In-memory DB for Operator data
spring.datasource.url=jdbc:h2:mem:operatordb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# ============================================
# DISTRIBUTED TRACING (Test Configuration)
# ============================================
# Disable tracing for unit tests
management.tracing.enabled=false

# Enable Feign micrometer integration (no harm to disable)
spring.cloud.openfeign.micrometer.enabled=false

server.port=0
