spring.application.name=payment-service
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
spring.profiles.active=dev

# ============================================
# DISTRIBUTED TRACING CONFIGURATION
# ============================================

# Enable tracing
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

# Zipkin endpoint for trace collection
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

# B3 propagation format (important for Zipkin compatibility)
management.tracing.propagation.produce=b3
management.tracing.propagation.consume=b3

# ============================================
# FEIGN MICROMETER INTEGRATION
# ============================================

# Enable Feign tracing to automatically propagate trace headers
spring.cloud.openfeign.micrometer.enabled=true

# ============================================
# LOGGING CONFIGURATION FOR TRACING
# ============================================

# Include traceId and spanId in all log lines
logging.pattern.level=%5p [${spring.application.name},traceId=%X{traceId},spanId=%X{spanId}]
