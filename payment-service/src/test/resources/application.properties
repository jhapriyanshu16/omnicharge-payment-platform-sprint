spring.application.name=payment-service

# Disable Cloud Features
spring.cloud.config.enabled=false
spring.cloud.discovery.enabled=false
eureka.client.enabled=false
spring.config.import=optional:configserver:
spring.main.allow-bean-definition-overriding=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Database (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:paymentdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Stripe Mock Keys (Required if you have @Value("${stripe.api.key}"))
stripe.api.key=sk_test_mock_key_123
stripe.webhook.secret=whsec_mock_secret

# ============================================
# DISTRIBUTED TRACING (Test Configuration)
# ============================================
# Disable tracing for unit tests
management.tracing.enabled=false

# Enable Feign micrometer integration (no harm to disable)
spring.cloud.openfeign.micrometer.enabled=false

# Server
server.port=0