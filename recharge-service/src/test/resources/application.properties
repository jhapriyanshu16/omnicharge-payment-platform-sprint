spring.cloud.config.enabled=false
spring.cloud.discovery.enabled=false
eureka.client.enabled=false
spring.config.import=optional:configserver:
spring.main.allow-bean-definition-overriding=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# In-memory DB for Recharge history
spring.datasource.url=jdbc:h2:mem:rechargedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Resilience4j Configuration for Circuit Breaker Tests
resilience4j.circuitbreaker.instances.operatorService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.operatorService.wait-duration-in-open-state=1000ms
server.port=0
